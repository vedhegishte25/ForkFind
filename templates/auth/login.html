{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div style="
  min-height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  background: linear-gradient(
    135deg,
    var(--cream) 0%,
    rgba(135,191,255,0.08) 100%
  );
">

  <div style="width: 100%; max-width: 420px;">

    <!-- header -->
    <div style="text-align:center; margin-bottom:2rem;">
      <div style="
        font-size: 2rem;
        font-weight: 900;
        color: var(--pine-green);
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
      ">
        Fork<span style="color:var(--sky-blue)">Find</span>
      </div>
      <h1 style="font-size:1.5rem; margin-bottom:0.375rem;">
        Welcome back
      </h1>
      <p style="color:var(--text-muted); font-size:0.9rem;">
        Sign in to discover your next favourite place
      </p>
    </div>

    <!-- card -->
    <div class="card" style="border-radius:var(--radius-xl); padding:2rem;">

      <form method="POST" action="{{ url_for('auth.login') }}">

        <!-- email -->
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <!-- password -->
        <div class="form-group">
          <div style="display:flex; justify-content:space-between;
                      align-items:center; margin-bottom:0.375rem;">
            <label class="form-label" style="margin:0" for="password">
              Password
            </label>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>

        <!-- submit -->
        <button
          type="submit"
          class="btn btn-primary w-100"
          style="margin-top:0.5rem; padding:0.75rem; font-size:1rem;">
          Sign In
        </button>

      </form>

      <!-- divider -->
      <div style="
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
      ">
        <div class="divider" style="flex:1; margin:0;"></div>
        <span style="font-size:0.8rem; color:var(--text-muted);">or</span>
        <div class="divider" style="flex:1; margin:0;"></div>
      </div>

      <!-- register link -->
      <div style="text-align:center; font-size:0.875rem;">
        <span style="color:var(--text-muted);">New to ForkFind?</span>
        <a href="{{ url_for('auth.register') }}"
           style="color:var(--pine-green); font-weight:700; margin-left:0.25rem;">
          Create an account
        </a>
      </div>

    </div>

    <!-- back to splash -->
    <div style="text-align:center; margin-top:1.5rem;">
      <a href="{{ url_for('main.splash') }}"
         style="font-size:0.8rem; color:var(--text-muted);">
        ← Back to home
      </a>
    </div>

  </div>
</div>

{% endblock %}
